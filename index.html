<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PizzaMate 🍕</title>

<style>
    body{
        margin:0;
        padding:0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #ff9966, #ff5e62);
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
    }

    .container{
        background:white;
        width:400px;
        padding:30px;
        border-radius:20px;
        text-align:center;
        box-shadow:0 8px 20px rgba(0,0,0,0.2);
    }

    h1{
        color:#ff5e62;
        margin-bottom:10px;
    }

    p{
        color:#555;
        font-size:16px;
        margin-bottom:20px;
    }

    .pizza{
        font-size:70px;
        margin-bottom:15px;
    }

    .btn{
        background:#ff5e62;
        color:white;
        border:none;
        padding:12px 25px;
        border-radius:30px;
        font-size:16px;
        cursor:pointer;
        transition:0.3s;
    }

    .btn:hover{
        background:#e64a50;
        transform:scale(1.05);
    }

    footer{
        margin-top:20px;
        font-size:14px;
        color:gray;
    }
</style>

</head>
<body>

<div class="container">

    <div class="pizza">🍕</div>

    <h1>PizzaMate</h1>

    <p>
        Welcome to PizzaMate Chatbot.<br>
        Order your favorite pizza easily!
    </p>

    <button class="btn">
        Chat With Us
    </button>

    <footer>
        Powered by IBM watsonx Assistant
    </footer>

</div>

<script>
  window.watsonAssistantChatOptions = {
    integrationID: "3c4fbd17-640c-45bb-b2b8-ac36ba38a30a",
    region: "eu-de",
    serviceInstanceID: "a8558f11-28ef-4113-82bf-ddaf0d66989f",
    onLoad: async (instance) => {
      await instance.render();
    }
  };

  setTimeout(function () {
    const t = document.createElement('script');
    t.src =
      "https://web-chat.global.assistant.watson.appdomain.cloud/versions/" +
      (window.watsonAssistantChatOptions.clientVersion || 'latest') +
      "/WatsonAssistantChatEntry.js";

    document.head.appendChild(t);
  });
</script>

</body>
</html>
